general {
    hide_cursor = true
    grace = 0
    no_fade_in = false
}

background {
    monitor =
    path = screenshot
    blur_passes = 2
    blur_size = 5
    noise = 0.0117
    contrast = 0.9
    brightness = 0.75
    vibrancy = 0.1696
    vibrancy_darkness = 0.0
}

# Clock
label {
    monitor =
    text = cmd[update:1000] echo "$(date +'%H:%M:%S')"
    color = rgba(00ff99ff)
    font_size = 90
    font_family = monospace Bold
    position = 0, 150
    halign = center
    valign = center
    shadow_passes = 2
    shadow_size = 10
    shadow_color = rgba(00ff9955)
    shadow_boost = 1.2
}

# Date
label {
    monitor =
    text = cmd[update:60000] echo "$(date +'%A, %B %d %Y')"
    color = rgba(33ccffdd)
    font_size = 20
    font_family = monospace
    position = 0, 60
    halign = center
    valign = center
    shadow_passes = 1
    shadow_size = 5
    shadow_color = rgba(33ccff44)
}

# Password input field
input-field {
    monitor =
    size = 360, 55
    outline_thickness = 2
    dots_size = 0.25
    dots_spacing = 0.2
    dots_center = true
    outer_color = rgba(33ccffcc)
    inner_color = rgba(050810aa)
    font_color = rgba(00ff99ff)
    fade_on_empty = false
    placeholder_text = <span foreground="##33ccff">[ PASSWORD ]</span>
    rounding = 4
    check_color = rgba(00ff99ff)
    fail_color = rgba(ff003ccc)
    fail_text = <i><span foreground="##ff003c">Access Denied</span></i>
    capslock_color = rgba(ffaa00cc)
    position = 0, -50
    halign = center
    valign = center
}

# Lock status label
label {
    monitor =
    text = ■  SYSTEM LOCKED  ■
    color = rgba(33ccff66)
    font_size = 11
    font_family = monospace
    position = 0, -130
    halign = center
    valign = center
    shadow_passes = 1
    shadow_size = 3
    shadow_color = rgba(33ccff33)
}
