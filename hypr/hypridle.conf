general {
    # loginctl lock-session → この lock_cmd が呼ばれる
    lock_cmd = pidof hyprlock || hyprlock
    # サスペンド直前（Lid閉じ含む）にロック
    before_sleep_cmd = loginctl lock-session
    # 復帰後にディスプレイを戻す
    after_sleep_cmd = hyprctl dispatch dpms on
}

$on_battery = sh -c 'for ac in /sys/class/power_supply/AC*/online; do [ -e "$ac" ] && [ "$(cat "$ac")" = "1" ] && exit 1; done; exit 0'

# 30分間操作なし → ロック
listener {
    timeout = 1800
    on-timeout = loginctl lock-session
    on-resume = hyprctl dispatch dpms on
}

# ロックから30秒後（計30分30秒）→ バッテリー駆動時のみディスプレイオフ
listener {
    timeout = 1830
    on-timeout = $on_battery && hyprctl dispatch dpms off
    on-resume = hyprctl dispatch dpms on
}

# 60分間操作なし → バッテリー駆動時のみサスペンド
listener {
    timeout = 3600
    on-timeout = $on_battery && systemctl suspend
}
